<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening AgroSense</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23238c5d' d='M54 10C34 11 20 21 14 37c-4 10 0 17 8 17 15 0 28-13 32-44zM16 49c4-3 9-7 14-12 5-5 10-12 14-20-14 5-24 14-28 24-1 3-1 6 0 8z'/%3E%3C/svg%3E">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #2c453f;
            background: #f6fdfa;
        }

        .fallback {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .loader {
            width: 1rem;
            height: 1rem;
            border-radius: 999px;
            border: 2px solid #d0ded6;
            border-top-color: #238c5d;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="fallback" aria-live="polite">
        <span class="loader" aria-hidden="true"></span>
        <span>Opening AgroSense...</span>
    </div>

    <script>
        async function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const apiBaseUrl = window.AGROSENSE_API_BASE_URL || 'http://127.0.0.1:8000';

            if (!token) {
                window.location.replace('login.html');
                return;
            }

            localStorage.setItem('agrosense_token', token);
            localStorage.setItem('agrosense_user', JSON.stringify({
                fullName: 'Farmer',
                email: '',
                location: '',
                phone: 'Not provided',
                farmType: '',
                farmSize: '',
                soilType: '',
                waterSource: 'Rain-fed',
                accountStatus: 'Active',
                avatar: null
            }));

            try {
                const response = await fetch(`${apiBaseUrl}/dashboard`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch user profile');
                }

                const dashboardData = await response.json();

                localStorage.setItem('agrosense_user', JSON.stringify({
                    fullName: dashboardData?.user?.name || '',
                    email: dashboardData?.user?.email || '',
                    location: dashboardData?.user?.location || '',
                    phone: dashboardData?.user?.phone_number || 'Not provided',
                    farmType: dashboardData?.farm_info?.farm_type || '',
                    farmSize: dashboardData?.farm_info?.farm_size ?? '',
                    soilType: dashboardData?.farm_info?.soil_type || '',
                    waterSource: dashboardData?.farm_info?.water_source || 'Rain-fed',
                    accountStatus: 'Active',
                    avatar: dashboardData?.user?.profile_picture
                        ? (String(dashboardData.user.profile_picture).startsWith('http')
                            ? dashboardData.user.profile_picture
                            : `${apiBaseUrl}${dashboardData.user.profile_picture}`)
                        : null
                }));
            } catch (error) {
                console.warn('OAuth profile fetch failed; dashboard will retry:', error);
            }

            window.location.replace('dashboard.html');
        }

        document.addEventListener('DOMContentLoaded', handleOAuthCallback);
    </script>
</body>
</html>
