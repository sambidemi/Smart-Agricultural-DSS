<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback - AgroSense</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #238c5d 0%, #2d9d6a 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .callback-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .callback-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .callback-title {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .callback-message {
            color: #666;
            margin-bottom: 1.5rem;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #238c5d;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="callback-icon">🌱</div>
        <h1 class="callback-title">Signing you in...</h1>
        <p class="callback-message">Please wait while we complete your authentication.</p>
        <div class="spinner"></div>
    </div>

    <script>
        // OAuth callback handler page.
        // When the backend redirects here after successful sign-in,
        // this script reads the token, loads the user profile, and stores
        // auth data in localStorage before taking the user to the dashboard.

        function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const provider = urlParams.get('provider');

            if (!token) {
                console.error('No token received from OAuth callback');
                window.location.href = 'index.html?auth=login';
                return;
            }

            // Store the auth state using the same logic as AuthManager
            const apiBaseUrl = window.AGROSENSE_API_BASE_URL || 'https://smart-agricultural-dss-production-5dd9.up.railway.app';

            // Fetch user profile to get full auth state
            fetch(`${apiBaseUrl}/dashboard`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to fetch user profile');
                }
                return response.json();
            })
            .then(dashboardData => {
                // Save auth state to localStorage
                localStorage.setItem('agrosense_token', token);
                localStorage.setItem('agrosense_user', JSON.stringify({
                    fullName: dashboardData?.user?.name || '',
                    email: dashboardData?.user?.email || '',
                    location: dashboardData?.user?.location || '',
                    phone: dashboardData?.user?.phone_number || 'Not provided',
                    farmType: dashboardData?.farm_info?.farm_type || '',
                    farmSize: dashboardData?.farm_info?.farm_size ?? '',
                    soilType: dashboardData?.farm_info?.soil_type || '',
                    waterSource: dashboardData?.farm_info?.water_source || 'Rain-fed',
                    accountStatus: 'Active',
                    avatar: dashboardData?.user?.profile_picture
                        ? (String(dashboardData.user.profile_picture).startsWith('http')
                            ? dashboardData.user.profile_picture
                            : `${apiBaseUrl}${dashboardData.user.profile_picture}`)
                        : null
                }));

                // Show success message and redirect
                document.querySelector('.callback-title').textContent = 'Success!';
                document.querySelector('.callback-message').textContent = `Signed in with ${provider.charAt(0).toUpperCase() + provider.slice(1)}`;
                document.querySelector('.spinner').style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            })
            .catch(error => {
                console.error('OAuth callback error:', error);
                document.querySelector('.callback-title').textContent = 'Authentication Failed';
                document.querySelector('.callback-message').textContent = 'There was an error completing your sign-in. Please try again.';
                document.querySelector('.spinner').style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'index.html?auth=login';
                }, 3000);
            });
        }

        // Handle the callback when the page loads
        document.addEventListener('DOMContentLoaded', handleOAuthCallback);
    </script>
</body>
</html>
